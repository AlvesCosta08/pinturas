services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alves-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alves-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./backend/uploads:/app/uploads # 📸 SALVA AS FOTOS NO SEU PC/SERVIDOR
      - ./backend/portfolio.json:/app/portfolio.json # 💾 SALVA O BANCO DE DADOS
    restart: always