services:
  # 🎨 FRONTEND (Usa o Dockerfile da raiz)
  frontend:
    build:
      context: .           # O contexto é a raiz do projeto
      dockerfile: Dockerfile # Usa o Dockerfile que está na raiz
    container_name: alves-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  # ⚙️ BACKEND (Usa o Dockerfile de dentro da pasta backend)
  backend:
    build:
      context: ./backend   # O contexto é a pasta backend
      dockerfile: Dockerfile # Usa o Dockerfile que está dentro de backend/
    container_name: alves-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always